name: Monorepo CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Check types
        run: pnpm check-types

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  siwx-e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app_dev_password
          POSTGRES_DB: appdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U app -d appdb"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:8
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      POSTGRES_URL: postgresql://app:app_dev_password@127.0.0.1:5432/appdb
      FRONTEND_ORIGIN: http://127.0.0.1:3000
      SIWX_DOMAIN: 127.0.0.1:3000
      SIWX_URI: http://127.0.0.1:3000
      NEXT_PUBLIC_BACKEND_URL: http://127.0.0.1:4000
      E2E_BASE_URL: http://127.0.0.1:3000
      E2E_WALLET_PASSWORD: Tester@1234
      E2E_WALLET_SEED: test test test test test test test test test test test junk
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm --filter frontend exec playwright install --with-deps chromium

      - name: Push database schema
        run: pnpm --filter @repo/db run db:push

      - name: Start backend and frontend
        run: nohup pnpm --filter backend run dev > backend-dev.log 2>&1 & nohup pnpm --filter frontend run dev > frontend-dev.log 2>&1 &

      - name: Wait for backend
        run: |
          for i in {1..60}; do
            if curl -sSf http://127.0.0.1:4000/health > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Backend failed to start"
          exit 1

      - name: Wait for frontend
        run: |
          for i in {1..60}; do
            if curl -sSf http://127.0.0.1:3000/login > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Frontend failed to start"
          exit 1

      - name: Build Synpress cache
        run: xvfb-run -a pnpm --filter frontend run test:e2e:cache

      - name: Run SIWX browser e2e
        run: xvfb-run -a pnpm --filter frontend run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/frontend/playwright-report
          if-no-files-found: ignore

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: apps/frontend/test-results
          if-no-files-found: ignore

      - name: Upload frontend/backend logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: app-dev-logs
          path: |
            backend-dev.log
            frontend-dev.log
          if-no-files-found: ignore
